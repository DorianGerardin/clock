<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigiClock</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="img/clock-logo.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Orbitron:wght@400..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

  <div id="clock-container">
    <div id="clock">
      <div id="date-container" onclick="switchTheme()">
        <div id="time"></div>
        <div id="date"></div>
      </div>
    </div>
  </div>

  <script src="clock.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
    </script>
</body>
</html>
